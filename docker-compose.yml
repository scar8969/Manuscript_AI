version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: manuscript_ai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manuscript_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manuscript_ai_backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/manuscript_ai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - ALLOWED_ORIGIN=http://localhost,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/temp:/app/temp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: manuscript_ai_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: